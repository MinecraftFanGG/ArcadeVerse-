            { id: "ffxiv", title: "Final Fantasy XIV: A Realm Reborn", category: "rpg", emoji: "🌏", excerpt: "The greatest comeback story in gaming, rebuilt from a failed launch into the best MMORPG.", meta: "Square Enix | 2013 | MMORPG", description: "<p>After its catastrophic 2010 launch, Square Enix shut down the servers, rebuilt the entire engine, and relaunched as A Realm Reborn in 2013. The new version features a richly written MSQ narrative spanning multiple expansion arcs, widely considered to have some of the best storytelling in the entire RPG genre.</p>" },
            { id: "pillars-eternity", title: "Pillars of Eternity", category: "rpg", emoji: "📜", excerpt: "A successful Kickstarter revival of the classic isometric CRPG format with a rich lore.", meta: "Obsidian Entertainment | 2015 | CRPG", description: "<p>Pillars of Eternity uses a real-time-with-pause combat system and a massive hand-crafted world with thousands of lines of reactive dialogue. Its 'Deadfire' sequel refined the formula further, adding ship-to-ship combat and a fully explorable archipelago.</p>" },
            { id: "planescape-torment", title: "Planescape: Torment", category: "rpg", emoji: "💀", excerpt: "A philosophical CRPG that asked 'What can change the nature of a man?' and answered it.", meta: "Black Isle Studios | 1999 | CRPG", description: "<p>Planescape: Torment is widely regarded as the most literary game ever made. Playing as an immortal amnesiac called The Nameless One, combat is actively discouraged; most encounters can be resolved entirely through dialogue. Its central question about identity and mortality still resonates decades later.</p>" },
            { id: "divinity2", title: "Divinity: Original Sin 2", category: "rpg", emoji: "⚗️", excerpt: "A CRPG with unmatched elemental surface interaction systems and co-op depth.", meta: "Larian Studios | 2017 | CRPG", description: "<p>Original Sin 2 builds its combat around a physics-based elemental system: fire ignites oil slicks, electricity conducts through water, and blood creates new surfaces for debuffs. Its four-player co-op allows players to split off and pursue entirely separate objectives simultaneously.</p>" },
            { id: "pathfinder-wrath", title: "Pathfinder: Wrath of the Righteous", category: "rpg", emoji: "🏹", excerpt: "A sprawling crusade-management CRPG integrating mythic powers and army logistics.", meta: "Owlcat Games | 2021 | CRPG", description: "<p>Wrath of the Righteous adds a crusade layer atop the classic Pathfinder CRPG combat. Players manage an entire military campaign, deploying crusader armies across a tactical map while navigating a deeply branching mythic path system that fundamentally alters character abilities and story outcomes.</p>" },
            { id: "xenoblade3", title: "Xenoblade Chronicles 3", category: "rpg", emoji: "🌿", excerpt: "A massive JRPG about warring colonies and the nature of life defined by combat.", meta: "Monolith Soft | 2022 | JRPG", description: "<p>Xenoblade 3 introduces the Ouroboros fusion system, where paired characters can merge into a massive joint form mid-battle. Its auto-attacking real-time combat system hides enormous mechanical depth in art cooldown management, class fusion, and chain-attack burst windows.</p>" },
            { id: "tales-of-arise", title: "Tales of Arise", category: "rpg", emoji: "🔥", excerpt: "A visually stunning JRPG that modernized the Tales combat formula with aerial rave systems.", meta: "Bandai Namco | 2021 | Action JRPG", description: "<p>Tales of Arise deploys a fully real-time action combat engine that tracks six-member party switching, aerial combo chaining, and a Boost Strike cooperative finishing system. Its thematic narrative explores liberation from oppression with rare moral nuance for the genre.</p>" },
            { id: "chrono-trigger", title: "Chrono Trigger", category: "rpg", emoji: "⏱️", excerpt: "The SNES golden-age masterpiece celebrated for its multi-ending time-travel narrative.", meta: "Square | 1995 | JRPG", description: "<p>Developed by a 'Dream Team' of Final Fantasy and Dragon Ball creators, Chrono Trigger pioneered the dual-tech and triple-tech cooperative attack system. Its thirteen distinct endings, unlockable via a New Game+ speedrun, were revolutionary for 1995 and remain a benchmark of RPG replayability design.</p>" },
            { id: "ff6", title: "Final Fantasy VI", category: "rpg", emoji: "🎹", excerpt: "The peak of the SNES era JRPG with an ensemble cast and operatic villain.", meta: "Square | 1994 | JRPG", description: "<p>Final Fantasy VI features no single protagonist, instead distributing narrative weight across 14 playable characters. Its villain Kefka Palazzo is considered gaming's greatest antagonist for actually succeeding in destroying the world mid-game. The opera sequence remains a landmark of emotional video game storytelling.</p>" },
            { id: "dq11", title: "Dragon Quest XI", category: "rpg", emoji: "🧙", excerpt: "The definitive modern JRPG faithfully upholding the 35-year Dragon Quest tradition.", meta: "Square Enix | 2018 | JRPG", description: "<p>Dragon Quest XI synthesizes the franchise's signature turn-based combat with Akira Toriyama's iconic character designs. Its post-game chapter offers an entirely new story arc with significant narrative twists, rewarding long-form player investment with meaningful structural surprises.</p>" },
            { id: "gothic2", title: "Gothic 2", category: "rpg", emoji: "🏰", excerpt: "A pioneering open-world CRPG with a fully simulated NPC schedule system.", meta: "Piranha Bytes | 2002 | Action RPG", description: "<p>Gothic 2 was a decade ahead of its time. Every NPC follows a 24-hour routine — sleeping, working, eating — that responds dynamically to world events. Its unforgiving difficulty and deeply systemic world influenced an entire generation of European RPG developers.</p>" },
            { id: "tyranny", title: "Tyranny", category: "rpg", emoji: "⚖️", excerpt: "A CRPG where you serve an evil overlord and must decide how ruthlessly to enforce his rule.", meta: "Obsidian Entertainment | 2016 | CRPG", description: "<p>Tyranny inverts the genre premise entirely: you have already lost. As an Overlord's Fatebinder, your role is to adjudicate conquered territories. Every choice builds favor or fear with rival factions, creating emergent political outcomes from moral compromise rather than heroism.</p>" },

            // ===================== ACTION =====================
            { id: "doom-eternal", title: "DOOM Eternal", category: "action", emoji: "💀", excerpt: "A masterclass in aggressive resource management masquerading as a first-person shooter.", meta: "id Software | 2020 | FPS", description: "<p>DOOM Eternal reframes its combat as a dance of resource extraction. Glory kills restore health, chainsawing enemies gives ammo, and flaming enemies drop armor. Players must juggle all three economies simultaneously across arenas designed for maximum vertical mobility exploitation.</p>" },
            { id: "bayonetta2", title: "Bayonetta 2", category: "action", emoji: "💜", excerpt: "A technical action game masterwork with the deepest combo system in the genre.", meta: "PlatinumGames | 2014 | Character Action", description: "<p>Bayonetta 2 builds on its predecessor's Witch Time dodge mechanic with new Umbran Climax burst states and Masked Lumen combat contrast sections. PlatinumGames' commitment to animation-cancel windows and input-reading enemy design produces some of the most technically expressive combat in gaming history.</p>" },
            { id: "sekiro", title: "Sekiro: Shadows Die Twice", category: "action", emoji: "🗡️", excerpt: "A posture-based sword duel system demanding rhythmic deflection mastery.", meta: "FromSoftware | 2019 | Action-Adventure", description: "<p>Sekiro abandons stamina-based defense in favor of a posture system where deflections and attacks accumulate enemy stance damage. Perfect deflection chains deal more posture damage than attacks, rewarding aggressive rhythmic swordplay over passive guarding.</p>" },
            { id: "hades", title: "Hades", category: "action", emoji: "🔱", excerpt: "The roguelite that mainstreamed the genre via reactive narrative and exceptional polish.", meta: "Supergiant Games | 2020 | Action Roguelite", description: "<p>Hades resolves the tension between narrative and rogue-lite replayability by making failure a plot mechanic. Every death returns Zagreus to the House of Hades where new dialogue advances the story. No run is wasted — story and skill both compound across attempts.</p>" },
            { id: "returnal", title: "Returnal", category: "action", emoji: "🌀", excerpt: "A bullet-hell third-person shooter with oppressive atmosphere and roguelite permanence.", meta: "Housemarque | 2021 | Third-Person Shooter", description: "<p>Returnal marries Housemarque's arcade precision bullet-pattern expertise with a Lovecraftian psychological horror narrative. Its roguelite loop strips progress on death, creating genuine stakes. The DualSense adaptive triggers assign different weapon modes to varying pressure levels on L2.</p>" },
            { id: "mgs5", title: "Metal Gear Solid V: The Phantom Pain", category: "action", emoji: "🐴", excerpt: "An open-world stealth sandbox with unmatched systemic infiltration depth.", meta: "Konami / Kojima Productions | 2015 | Stealth Action", description: "<p>MGSV deploys fully dynamic enemy AI that adapts to player tactics between missions — equipping helmets if headshots are used, wearing earplugs if Fulton extractions are detected. Its open-world iDROID mission framework allowed unprecedented stealth sandbox flexibility.</p>" },
            { id: "dmc5", title: "Devil May Cry 5", category: "action", emoji: "🌹", excerpt: "The apex of the stylish action genre with three mechanically distinct playable characters.", meta: "Capcom | 2019 | Character Action", description: "<p>DMC5 scores player performance in real-time on a letter-grade system from D to SSS based on style variety, damage avoidance, and combo creativity. Each of its three characters — Nero, Dante, and V — operates on an entirely different mechanical framework with no overlap.</p>" },
            { id: "ghostrunner", title: "Ghostrunner", category: "action", emoji: "⚡", excerpt: "A one-hit-kill cyberpunk action platformer demanding frame-perfect wall-running.", meta: "One More Level | 2020 | Action Platformer", description: "<p>Ghostrunner distills cyberpunk traversal into pure momentum. The player dies in one hit from any enemy, and so do all enemies from the player's katana. Its checkpoint-dense level design turns each arena into a reflex puzzle that rewards clean, flowing solutions over brute force.</p>" },
            { id: "sifu", title: "Sifu", category: "action", emoji: "👊", excerpt: "A kung fu brawler where aging on death creates strategic risk-reward tradeoffs.", meta: "Sloclap | 2022 | Beat 'em Up", description: "<p>Sifu's central mechanic turns death into a resource: each defeat adds years to your character's age, increasing damage dealt but reducing maximum health. Players must decide when to spend age to continue versus resetting to preserve vitality for later boss encounters.</p>" },
            { id: "hi-fi-rush", title: "Hi-Fi Rush", category: "action", emoji: "🎸", excerpt: "A rhythm-action game where the entire world pulses to the beat.", meta: "Tango Gameworks | 2023 | Rhythm Action", description: "<p>Hi-Fi Rush synchronises every element — environmental hazards, enemy attacks, combo windows, and even background scenery — to a BPM clock. Attacking on-beat generates score multipliers, and the game rewards musical awareness as much as button execution.</p>" },
            { id: "control", title: "Control", category: "action", emoji: "🔫", excerpt: "A telekinetic third-person shooter set in a brutalist Metroidvania government building.", meta: "Remedy Entertainment | 2019 | Third-Person Shooter", description: "<p>Control anchors its combat to a telekinetic Launch ability that turns environmental debris into hitscan projectiles. Its interconnected Oldest House map rewards exploration with Metroidvania-style ability unlocks, wrapped in a compelling New Weird narrative full of cryptic Bureau documents.</p>" },
            { id: "ultrakill", title: "ULTRAKILL", category: "action", emoji: "🩸", excerpt: "A retro-styled FPS where health regenerates by shooting enemies at point-blank range.", meta: "Arsi 'Hakita' Patala | 2020 | FPS", description: "<p>ULTRAKILL's health system demands constant aggression: standing still is death, as blood can only be collected by landing at close range. Its style ranking system, rocket-surfing physics, and arsenal of trick shots have cultivated one of the most dedicated speedrun communities in indie gaming.</p>" },
            { id: "titanfall2", title: "Titanfall 2", category: "action", emoji: "🤖", excerpt: "The greatest single-player FPS campaign of its generation, criminally underplayed.", meta: "Respawn Entertainment | 2016 | FPS", description: "<p>Titanfall 2's campaign is a relentless showcase of creative set-piece design. Its 'Effect and Cause' time-manipulation level is frequently cited as one of the best individual levels in FPS history. The momentum-based wall-running locomotion system set the template for Apex Legends' movement philosophy.</p>" },
            { id: "nioh2", title: "Nioh 2", category: "action", emoji: "👹", excerpt: "A dense Soulslike action game with unmatched weapon stance depth and Yokai abilities.", meta: "Team Ninja | 2020 | Action RPG", description: "<p>Nioh 2 layers a three-stance system — High, Mid, Low — onto every weapon class, tripling the effective moveset available per weapon. Its Burst Counter mechanic requires reading Yokai attack telegraphs to absorb and redirect their most devastating hits.</p>" },
            { id: "hollow-knight", title: "Hollow Knight", category: "action", emoji: "🦋", excerpt: "A Metroidvania masterpiece with 40+ hours of hand-crafted underground world exploration.", meta: "Team Cherry | 2017 | Metroidvania", description: "<p>Hollow Knight maps an interconnected network of underground kingdoms with zero hand-holding. Its Soul magic system charges via melee attacks and discharges as healing or spells, making resource management central to every boss encounter. The Pantheon of Hallownest DLC adds some of the most demanding platformer challenges ever designed.</p>" },

            // ===================== STRATEGY =====================
            { id: "starcraft2", title: "StarCraft II", category: "strategy", emoji: "🛸", excerpt: "The definitive RTS esport, balancing three completely asymmetric factions at high APM.", meta: "Blizzard Entertainment | 2010 | RTS", description: "<p>StarCraft II's three-race design — Terran, Zerg, and Protoss — each operates on a fundamentally different macro economy and unit interaction matrix. Competitive play measures Actions Per Minute as a performance KPI, with grandmaster players executing precise build-order queues with sub-second timing.</p>" },
            { id: "total-war-warhammer3", title: "Total War: Warhammer III", category: "strategy", emoji: "⚔️", excerpt: "A grand strategy game pairing diplomatic campaign maps with massive real-time battles.", meta: "Creative Assembly | 2022 | Strategy", description: "<p>Warhammer III manages simultaneous strategic and tactical layers. On the campaign map, players negotiate alliances, manage corruption, and move armies across provinces. On the battlefield, units of hundreds of models calculate morale, flanking bonuses, and magical ability trajectories in real time.</p>" },
            { id: "into-the-breach", title: "Into the Breach", category: "strategy", emoji: "🦿", excerpt: "A perfect information turn-based tactics game with no randomness in enemy intent.", meta: "Subset Games | 2018 | Tactics", description: "<p>Into the Breach shows every enemy action before it resolves, converting a strategy game into a pure puzzle. Victory depends on creative use of push/pull displacement mechanics to redirect attacks, protect civilians, and position mechs for maximum chain reactions with minimal resources.</p>" },
            { id: "hades-strategy", title: "XCOM 2", category: "strategy", emoji: "👽", excerpt: "A tension-laden tactics game where permadeath soldiers build emotional attachment.", meta: "Firaxis Games | 2016 | Turn-Based Tactics", description: "<p>XCOM 2 weaponises soldier naming and progression to manufacture emotional investment. Losing a colonel who has survived 30 missions creates genuine grief. Its concealment system flips the traditional XCOM dynamic: players now ambush the enemy rather than react to alien aggression.</p>" },
            { id: "anno-1800", title: "Anno 1800", category: "strategy", emoji: "🏭", excerpt: "A deep industrial-era city builder with complex supply chain logistics.", meta: "Ubisoft Blue Byte | 2019 | City Builder", description: "<p>Anno 1800 balances population-tier satisfaction chains across hundreds of building types. Each citizen tier unlocks new production needs — Farmer needs differ entirely from Engineer needs — creating compound logistics that must scale simultaneously across island chains.</p>" },
            { id: "stellaris", title: "Stellaris", category: "strategy", emoji: "🌠", excerpt: "A grand 4X space strategy game driven by emergent narrative event chains.", meta: "Paradox Interactive | 2016 | Grand Strategy", description: "<p>Stellaris procedurally generates its galaxy, alien species, and diplomatic relationships at the start of every run. Its mid-game crisis events — awakened fallen empires, interdimensional invaders — force coalition diplomacy among previously hostile factions.</p>" },
            { id: "hoi4", title: "Hearts of Iron IV", category: "strategy", emoji: "🌍", excerpt: "The definitive WWII grand strategy simulation, tracking every division on the globe.", meta: "Paradox Interactive | 2016 | Grand Strategy", description: "<p>HOI4 simulates the entire Second World War at a per-division operational level. Players design custom division templates, manage supply lines across terrain types, execute naval invasions, and conduct air superiority campaigns — all simultaneously on a real-time global map.</p>" },
            { id: "age-of-empires4", title: "Age of Empires IV", category: "strategy", emoji: "🏯", excerpt: "A historically grounded RTS bringing eight asymmetric civilisations to modern hardware.", meta: "Relic Entertainment | 2021 | RTS", description: "<p>AoE IV differentiates its eight civs at a fundamental mechanical level — the Mongols can pack and relocate their entire town, while the Chinese unlock imperial dynasties that change tech tree structures. Landmark buildings replace the generic wonder system with civ-specific strategic buildings.</p>" },
            { id: "wargroove2", title: "Wargroove 2", category: "strategy", emoji: "🎺", excerpt: "A pixel-art turn-based tactics game expanding on Advance Wars' movement grid formula.", meta: "Chucklefish | 2023 | Turn-Based Tactics", description: "<p>Wargroove 2 adds roguelite Conquest mode runs alongside its branching campaign. Its commander Groove system charges ultimate abilities through combat actions, requiring tactical prioritisation of both damage dealing and ability charging to control tempo.</p>" },
            { id: "phoenix-point", title: "Phoenix Point", category: "strategy", emoji: "🦠", excerpt: "An XCOM-spiritual successor with fully destructible enemy body-part targeting.", meta: "Snapshot Games | 2019 | Turn-Based Tactics", description: "<p>Phoenix Point introduces a manual aiming reticle into turn-based tactics, allowing players to precisely target enemy limbs. Shooting a Crab-Man's claw removes its melee attack; targeting a Siren's head prevents its mind-control ability — adding anatomical threat analysis to standard tactics play.</p>" },
            { id: "frostpunk-og", title: "Frostpunk", category: "strategy", emoji: "🌨️", excerpt: "A brutal society survival game where every law you pass has a moral cost.", meta: "11 bit studios | 2018 | City Builder / Survival", description: "<p>Frostpunk's Book of Laws mechanic forces players to enact increasingly authoritarian policies to survive the cold. Child Labour, Propaganda, and Emergency Shifts all offer survival benefits at the cost of Hope and Discontent meters — making civilizational collapse feel genuinely earned.</p>" },
            { id: "midnight-protocol", title: "Invisible, Inc.", category: "strategy", emoji: "🕵️", excerpt: "A turn-based stealth tactics game with procedurally generated corporate infiltrations.", meta: "Klei Entertainment | 2015 | Stealth Tactics", description: "<p>Invisible Inc. imposes an alarm clock: each turn advances enemy security, permanently narrowing safe corridors. Every mission demands improvisation under escalating pressure, and permadeath agents force recalculation of entire team compositions mid-campaign.</p>" },
            { id: "diplomacy-is-not", title: "Diplomacy is Not an Option", category: "strategy", emoji: "🏹", excerpt: "A real-time RTS blending castle defence with massive empire management.", meta: "Door 407 | 2023 | RTS / Tower Defence", description: "<p>Diplomacy is Not an Option throws never-ending waves of thousands of enemies at the player's castle. Its macro layer demands territorial expansion and resource extraction to fund walls, towers, and armies, creating a multi-scale strategic simulation wrapped in deliberately comedic presentation.</p>" },
            { id: "iron-harvest", title: "Iron Harvest", category: "strategy", emoji: "⚙️", excerpt: "A diesel-punk RTS set in an alternate 1920s Europe with giant mechs.", meta: "KING Art Games | 2020 | RTS", description: "<p>Iron Harvest adapts the Scythe board game's alternate history aesthetic into a cover-based RTS. Units can destroy terrain for new firing angles, and mech units require infantry support to counter their vulnerabilities, creating combined-arms tactical depth.</p>" },
            { id: "bad-north", title: "Bad North", category: "strategy", emoji: "🛡️", excerpt: "A minimalist real-time tactics game defending Norse islands with tiny armies.", meta: "Plausible Concept | 2018 | Real-Time Tactics", description: "<p>Bad North condenses tactics into islands that can be surveyed in seconds. Three unit types — spearmen, archers, pikemen — must be positioned to exploit elevation and chokepoints before Viking hordes arrive. Permadeath commanders create attachment within its short-run structure.</p>" },

            // ===================== PLATFORMER =====================
            { id: "super-mario-odyssey", title: "Super Mario Odyssey", category: "platformer", emoji: "🎩", excerpt: "A joyful 3D platformer built around hat-throw possession mechanics.", meta: "Nintendo | 2017 | 3D Platformer", description: "<p>Odyssey's Cappy mechanic lets Mario throw his hat to capture and control enemies, objects, and NPCs, creating hundreds of unique movement puzzles. Its Moon-collecting structure is deliberately generous, hiding rewards in clever environmental observations rather than difficulty spikes.</p>" },
            { id: "celeste", title: "Celeste", category: "platformer", emoji: "🏔️", excerpt: "A precision platformer with compassionate assist modes and a mental health narrative.", meta: "Maddy Thorson & Noel Berry | 2018 | Precision Platformer", description: "<p>Celeste synchronises its mechanical difficulty with its narrative: climbing the mountain gets harder as Madeline confronts her anxiety. Its Assist Mode — adjustable game speed, infinite stamina, invincibility — is framed as a valid option, not a failure state, making it one of gaming's most inclusive designs.</p>" },
            { id: "hollow-knight-silksong", title: "Ori and the Will of the Wisps", category: "platformer", emoji: "✨", excerpt: "A visually breathtaking Metroidvania platformer with fluid spirit-dash movement.", meta: "Moon Studios | 2020 | Metroidvania Platformer", description: "<p>Will of the Wisps expands Ori's movement vocabulary with bash, burrow, and grapple abilities that chain into extended air combats. Its emotion-driven narrative, scored by a live orchestra, and hand-painted shader visuals set a benchmark for artistic ambition in the genre.</p>" },
            { id: "ratchet-and-clank-rift", title: "Ratchet & Clank: Rift Apart", category: "platformer", emoji: "🌀", excerpt: "A dimension-hopping platformer showcasing SSD loading via on-screen rift portals.", meta: "Insomniac Games | 2021 | 3D Platformer", description: "<p>Rift Apart uses the PS5 SSD to load entire parallel dimensions within a single second via in-world portals. Players fire through rifts mid-combat to teleport across arenas, making loading speed a direct gameplay mechanic for the first time in the medium's history.</p>" },
            { id: "yoshi-crafted", title: "Yoshi's Crafted World", category: "platformer", emoji: "🥚", excerpt: "A charming crafted-aesthetic platformer with fully reversible two-sided level design.", meta: "Good-Feel | 2019 | 2.5D Platformer", description: "<p>Crafted World builds each level from real craft materials — cardboard, cloth, and PVC — with a physically coherent reverse side. Completing a level's front path unlocks a mirrored rear playthrough revealing background secrets, doubling level design value per asset.</p>" },
            { id: "shovel-knight", title: "Shovel Knight: Treasure Trove", category: "platformer", emoji: "⛏️", excerpt: "An NES-era love letter that surpasses its inspirations in design and content.", meta: "Yacht Club Games | 2014 | Platformer", description: "<p>Shovel Knight translates 8-bit NES constraints — limited colour palette, scrolling rules, sound chip music — into a deliberate design language. Its four standalone campaigns each feature entirely different mechanics, effectively making Treasure Trove a collection of four complete platformer games.</p>" },
            { id: "little-big-planet", title: "LittleBigPlanet 3", category: "platformer", emoji: "🧶", excerpt: "A creative platformer where user-generated content became the primary draw.", meta: "Sumo Digital | 2014 | Platformer / Creator", description: "<p>LittleBigPlanet's 'Play, Create, Share' philosophy built one of gaming's most prolific user-content ecosystems. Players built millions of levels, minigames, and art installations using the in-game editor, turning the platform into an accessible creative sandbox.</p>" },
            { id: "crash4", title: "Crash Bandicoot 4: It's About Time", category: "platformer", emoji: "🌀", excerpt: "A demanding modern revival with quantum mask powers altering physics rules.", meta: "Toys for Bob | 2020 | 3D Platformer", description: "<p>Crash 4 introduces Quantum Masks that temporarily invert gravity, slow time, or phase objects in and out of existence. Its 100% completion targets — collecting all gems and relics — requires near-perfect play across every level, delivering significant challenge depth beyond casual completion.</p>" },
            { id: "astro-playroom", title: "Astro's Playroom", category: "platformer", emoji: "🎮", excerpt: "A DualSense tech demo platformer that became a beloved game in its own right.", meta: "Team Asobi | 2020 | 3D Platformer", description: "<p>Astro's Playroom uses every DualSense feature — haptic feedback, adaptive triggers, microphone, gyroscope — as core game mechanics. Running on sand, rain on plastic, spring tensions: each surface triggers a distinct haptic profile, making it the most tactile platformer ever made.</p>" },
            { id: "prince-of-persia-sands", title: "Prince of Persia: The Sands of Time", category: "platformer", emoji: "⏳", excerpt: "The 2003 action platformer that defined fluid free-running and time-rewind mechanics.", meta: "Ubisoft Montreal | 2003 | Action Platformer", description: "<p>Sands of Time introduced the Dagger of Time — a rewind mechanic that let players undo mistakes in real time. Combined with wall-running, pole-vaulting, and acrobatic combat, it established the template that Assassin's Creed and countless free-running games would inherit.</p>" },
            { id: "banjo-kazooie", title: "Banjo-Kazooie", category: "platformer", emoji: "🐻", excerpt: "Rare's N64 collectathon classic defining the collect-a-thon 3D platformer sub-genre.", meta: "Rare | 1998 | 3D Platformer", description: "<p>Banjo-Kazooie refined Mario 64's collectathon blueprint by tying moves to a shared ability pool between Banjo's strength and Kazooie's flight. Its nine worlds each centre on a unique thematic ruleset, and its irreverent NPC writing style created some of gaming's most memorable peripheral characters.</p>" },
            { id: "kirby-forgotten-land", title: "Kirby and the Forgotten Land", category: "platformer", emoji: "⭐", excerpt: "Kirby's first full 3D adventure with Mouthful Mode object-absorption gimmicks.", meta: "HAL Laboratory | 2022 | 3D Platformer", description: "<p>Forgotten Land introduces Mouthful Mode, allowing Kirby to inhale objects too large to copy — cars, cones, water dispensers — gaining their unique physics properties. Its post-game Colosseum mode presents pure boss-rush challenge for players who want mechanical depth beyond the accessible main story.</p>" },

            // ===================== HORROR =====================
            { id: "resident-evil-village", title: "Resident Evil Village", category: "horror", emoji: "🏚️", excerpt: "A gothic horror action game blending Lady Dimitrescu's castle with supernatural creature encounters.", meta: "Capcom | 2021 | Survival Horror", description: "<p>Village uses four distinct monster-house biomes — vampire castle, mermaid lake, puppet workshop, fortress — each with a unique monster design philosophy. Its merchant system tracks treasure value and allows weapon upgrades with genuine economic scarcity pressure, balancing resource horror with action spectacle.</p>" },
            { id: "alien-isolation", title: "Alien: Isolation", category: "horror", emoji: "👾", excerpt: "The most terrifying AI-driven stealth horror game ever made, running two separate AI systems.", meta: "Creative Assembly | 2014 | Stealth Horror", description: "<p>Isolation's Xenomorph is controlled by two separate AI subsystems: the Director AI identifies where the player is likely hiding and sends the alien to investigate, while the alien AI itself reacts only to local senses. This design prevents the player from ever learning a predictable pattern.</p>" },
            { id: "amnesia-dark", title: "Amnesia: The Dark Descent", category: "horror", emoji: "🕯️", excerpt: "The game that defined modern first-person survival horror by removing all combat.", meta: "Frictional Games | 2010 | Survival Horror", description: "<p>Amnesia removes the player's ability to fight, creating pure helplessness. Its sanity mechanic degrades when the player looks at monsters or dwells in darkness, causing visual and audio distortion that blurs the line between game state and psychological breakdown. It launched the let's-play streaming format.</p>" },
            { id: "outlast", title: "Outlast", category: "horror", emoji: "📷", excerpt: "A found-footage horror game where your only tool is a battery-draining camcorder.", meta: "Red Barrels | 2013 | Survival Horror", description: "<p>Outlast arms the player only with a camcorder whose night-vision mode drains batteries — a finite resource creating constant scarcity anxiety. Its asylum setting and realistic presentation horrified streaming audiences worldwide, proving that content creator playthrough reactions had become a primary horror marketing vector.</p>" },
            { id: "silent-hill2", title: "Silent Hill 2", category: "horror", emoji: "🌫️", excerpt: "The psychological horror masterpiece that tailors monster design to protagonist guilt.", meta: "Konami | 2001 | Psychological Horror", description: "<p>Silent Hill 2's monsters — Pyramid Head, Mannequins, Nurses — are literal manifestations of James Sunderland's sexual guilt and violent impulses. The game's famous 'Leave' ending is only accessible by specific playstyle patterns tracked invisibly throughout, creating a meta-commentary on player behaviour.</p>" },
            { id: "re-biohazard", title: "Resident Evil 7: Biohazard", category: "horror", emoji: "🏠", excerpt: "A franchise reinvention using first-person perspective to restore resource-management dread.", meta: "Capcom | 2017 | Survival Horror", description: "<p>Biohazard shifted Resident Evil from third-person spectacle back to first-person claustrophobia. The Baker family mansion operates as a coherent space with persistent logic — rooms remain disturbed after fights — restoring the original series' inventory management and backtracking horror formula.</p>" },
            { id: "fnaf", title: "Five Nights at Freddy's", category: "horror", emoji: "🎭", excerpt: "The indie game that spawned a multimedia franchise from security camera resource management.", meta: "Scott Cawthon | 2014 | Survival Horror", description: "<p>FNAF reduces horror to a resource equation: power. Players manage a fixed nightly power budget across camera monitoring, door sealing, and light checking. The animatronic AI states are deliberately opaque, teaching players threat patterns through repeated fatal encounters.</p>" },
            { id: "lethal-company", title: "Lethal Company", category: "horror", emoji: "💼", excerpt: "A co-op moon-scavenging horror game with dynamic creature AI and company quota pressure.", meta: "Zeekerss | 2023 | Co-op Horror", description: "<p>Lethal Company imposes a corporate quota that escalates each three-day cycle, forcing increasingly risky moon excursions. Its procedurally arranged interior maps ensure no two runs have the same layout, while creature AI adapts to team formations, creating genuine unpredictability in co-op spaces.</p>" },
            { id: "soma", title: "SOMA", category: "horror", emoji: "🤖", excerpt: "A sci-fi horror game that uses body horror to ask profound questions about consciousness.", meta: "Frictional Games | 2015 | Sci-Fi Horror", description: "<p>SOMA takes place in a collapsed underwater PATHOS-II facility. Its horror derives less from monsters than from philosophical confrontations: What constitutes a person? Is a perfect digital copy of a mind the same entity? Its safe mode removes creature danger, proving the narrative alone carries the experience.</p>" },
            { id: "dredge", title: "Dredge", category: "horror", emoji: "🎣", excerpt: "A fishing cozy game that gradually corrupts into Lovecraftian maritime horror.", meta: "Black Salt Games | 2023 | Narrative Horror", description: "<p>Dredge starts as a peaceful fishing management game and uses its day/night cycle to introduce escalating supernatural horror. Night fishing corrupts the player's sanity meter, causing increasingly disturbing hallucinations in the water below. The slow tonal shift is one of the most effective genre subversions in recent memory.</p>" },
            { id: "darkwood", title: "Darkwood", category: "horror", emoji: "🌲", excerpt: "A top-down survival horror game with dynamic night siege mechanics.", meta: "Acid Wizard Studio | 2017 | Survival Horror", description: "<p>Darkwood replaces jump scares with sustained atmospheric dread. Players spend days scavenging a corrupted forest and nights barricading their hideout against creatures that learn barricade layouts between sieges. Its top-down perspective creates unique horror through limited peripheral vision.</p>" },
            { id: "little-nightmares2", title: "Little Nightmares II", category: "horror", emoji: "🎪", excerpt: "A cinematic puzzle-platformer horror game with oppressive scale contrast design.", meta: "Tarsier Studios | 2021 | Puzzle Horror", description: "<p>Little Nightmares II uses extreme size scaling to create helplessness — protagonists are tiny against teachers, hunters, and broadcasters whose heads turn independently of their bodies. Its wordless narrative and expressionistic world-design communicate existential dread through pure visual metaphor.</p>" },

            // ===================== FIGHTING =====================
            { id: "mortal-kombat1", title: "Mortal Kombat 1", category: "fighting", emoji: "🩸", excerpt: "NetherRealm's rebooted timeline fighter with the Kameo system and cinematic story mode.", meta: "NetherRealm Studios | 2023 | 2D Fighter", description: "<p>MK1 introduces Kameo Fighters — assist characters drawn from series history — selectable independently of the main roster. The Invasion Mode replaces traditional towers with a board-game seasonal campaign. Its story mode cinematic presentation remains the genre's benchmark for narrative production value.</p>" },
            { id: "guilty-gear-strive", title: "Guilty Gear -Strive-", category: "fighting", emoji: "🎸", excerpt: "Arc System Works' most accessible fighter, hiding enormous depth beneath clean visuals.", meta: "Arc System Works | 2021 | 2D Fighter", description: "<p>Strive simplifies Guilty Gear's complex roman cancel system without reducing its depth — wall break mechanics create distinct neutral, pressure, and punish paradigms per corner position. Its art direction, achieved by painting hand-drawn textures directly onto 3D models, is the most visually distinctive in the genre.</p>" },
            { id: "street-fighter3", title: "Street Fighter III: 3rd Strike", category: "fighting", emoji: "🎯", excerpt: "The technical apex of 2D fighting, defined by the Parry mechanic.", meta: "Capcom | 1999 | 2D Fighter", description: "<p>3rd Strike elevated competitive play by replacing blocking with forward-tap Parries that negate all damage but require precise timing. Daigo Umehara's legendary 2004 EVO comeback — parrying 15 consecutive super-art hits — remains the most iconic moment in competitive gaming history.</p>" },
            { id: "granblue-versus", title: "Granblue Fantasy Versus: Rising", category: "fighting", emoji: "⚔️", excerpt: "An accessible arc-system fighter with a simplified special input system for newcomers.", meta: "Cygames / Arc System Works | 2023 | 2D Fighter", description: "<p>Rising removes traditional quarter-circle and charge inputs in favour of a simplified skill button system, dramatically lowering the execution barrier for new players. Its RPG mode provides an introductory narrative context and currency for unlocking skins, bridging the gap between gacha and fighting game communities.</p>" },
            { id: "samurai-shodown", title: "Samurai Shodown (2019)", category: "fighting", emoji: "🔪", excerpt: "A weapon-based fighter where a single hit can decide a round.", meta: "SNK | 2019 | Weapons Fighter", description: "<p>Samurai Shodown's damage values are calibrated so any hit from a sword represents a round-defining event. Its Rage mechanic builds under pressure and can manifest as a Rage Explosion reversal or be cashed for a single devastating Super attack, creating extreme risk-reward at low health.</p>" },
            { id: "dragon-ball-fighterz", title: "Dragon Ball FighterZ", category: "fighting", emoji: "⚡", excerpt: "A visually faithful 3v3 anime fighter with beam-clash supermove cinematics.", meta: "Arc System Works | 2018 | 3v3 Fighter", description: "<p>FighterZ replicates Dragon Ball's visual language — screen-filling beam attacks, mid-air dashes, Sparking Blast transformations — in a 3v3 tag fighter format borrowed from Marvel vs Capcom. Its Dragon Rush mix-up system forces defensive decision-making under pressure during combo resets.</p>" },
            { id: "melty-blood", title: "Melty Blood: Type Lumina", category: "fighting", emoji: "🌙", excerpt: "A popular anime fighter notable for its aerial dash combat and shield mechanic.", meta: "French Bread | 2021 | 2D Fighter", description: "<p>Type Lumina features a Moon Skill system where each character has three distinct loadout options with unique special move sets, tripling effective character variety. Its shield reversal system turns defensive play into an active mind-game, rewarding reads over passive blocking.</p>" },
            { id: "virtua-fighter5", title: "Virtua Fighter 5: Ultimate Showdown", category: "fighting", emoji: "🥋", excerpt: "The 3D fighting game purist's choice, with no special meters or gimmicks.", meta: "Sega AM2 | 2021 | 3D Fighter", description: "<p>Virtua Fighter's design philosophy rejects super meters, comeback mechanics, and projectiles entirely. Combat resolves purely through strike/throw/guard triangle interactions, counter-hit state exploitation, and ring-out positioning. It remains the most technically pure 3D fighting game in existence.</p>" },
            { id: "fantasy-strike", title: "Fantasy Strike", category: "fighting", emoji: "🌟", excerpt: "The most accessible fighting game ever made, designed for pad-one-button inputs.", meta: "Sirlin Games | 2019 | 2D Fighter", description: "<p>Fantasy Strike reduces every special move to a single button press with no directional inputs required, removing execution as a skill layer entirely. Its design isolates read and decision-making — the true core of fighting game competition — making it a valuable entry point for new competitive players.</p>" },

            // ===================== SPORTS =====================
            { id: "rocket-league", title: "Rocket League", category: "sports", emoji: "🚗", excerpt: "A physics-based vehicular soccer game with a ceiling for mechanical skill almost unreachable.", meta: "Psyonix | 2015 | Sports", description: "<p>Rocket League's skill ceiling emerges from boost management, aerial car rotation physics, and wall-ceiling navigation. Grandmaster play involves triple-resets, ceiling shots, and wave-dashes that require hundreds of hours to execute reliably. Its free-to-play transition massively expanded its global competitive ecosystem.</p>" },
            { id: "pga-tour-2k23", title: "EA Sports PGA Tour", category: "sports", emoji: "⛳", excerpt: "The only officially licensed golf sim featuring all four Major championships.", meta: "EA Tiburon | 2023 | Sports Sim", description: "<p>EA Sports PGA Tour holds exclusive licensing to The Masters, The Open, US Open, and PGA Championship courses. Its swing mechanic adds a three-click precision timing layer and spin control over shot trajectory, combined with real-time course condition modelling for wind and moisture.</p>" },
            { id: "tony-hawk-pro", title: "Tony Hawk's Pro Skater 1+2", category: "sports", emoji: "🛹", excerpt: "The definitive remaster of two iconic skateboarding games preserving the original score-chasing feel.", meta: "Vicarious Visions | 2020 | Sports", description: "<p>THPS 1+2 rebuilds both games in a new engine while faithfully preserving the original 2-minute run timer, gap trick system, and SKATE letter hunt objectives. Its create-a-skater and create-a-park modes support online sharing, dramatically extending the remaster's lifespan beyond nostalgia.</p>" },
            { id: "f1-24", title: "F1 24", category: "sports", emoji: "🏎️", excerpt: "The official Formula 1 simulation with adaptive AI difficulty and a revamped My Team mode.", meta: "Codemasters | 2024 | Racing Sim", description: "<p>F1 24 introduces a revised physics model focused on realistic tyre thermal and degradation curves. Its Driver Career mode allows players to take over seats at real F1 teams, managing contract negotiations and performance targets across multi-season campaigns.</p>" },
            { id: "ea-fc25", title: "EA Sports FC 25", category: "sports", emoji: "⚽", excerpt: "The latest iteration of the world's most popular football simulation with FC IQ tactical intelligence.", meta: "EA Sports | 2024 | Sports Sim", description: "<p>FC 25 introduces FC IQ, an overhaul to player role positioning and tactical AI that gives each player distinct responsibilities on and off the ball. Rush mode adds 5v5 small-sided matches to Ultimate Team, creating a faster-paced competitive format alongside traditional 11v11 play.</p>" },
            { id: "nba2k25", title: "NBA 2K25", category: "sports", emoji: "🏀", excerpt: "The basketball simulation with the deepest MyCareer progression and most realistic player physics.", meta: "Visual Concepts | 2024 | Sports Sim", description: "<p>NBA 2K25 overhauls its dribbling system with a new Pro Play technology that maps real NBA footage directly onto game animations. Its City open-world narrative hub expands MyCareer with social activities, fashion systems, and online tournaments embedded in the same persistent server environment.</p>" },
            { id: "mlb-the-show-24", title: "MLB The Show 24", category: "sports", emoji: "⚾", excerpt: "The definitive baseball simulation with cross-platform Diamond Dynasty card collecting.", meta: "San Diego Studio | 2024 | Sports Sim", description: "<p>The Show 24 refines its Plate Coverage Indicator (PCI) hitting system with new Perfect-Perfect hit trajectory rewards. Its Road to the Show mode now includes a full Storylines feature documenting real historical Negro Leagues players with hand-drawn cinematics.</p>" },
            { id: "steep", title: "Riders Republic", category: "sports", emoji: "🏔️", excerpt: "A massive multiplayer outdoor sports sandbox spanning bike, ski, wing-suit, and snowboard.", meta: "Ubisoft Annecy | 2021 | Sports Sandbox", description: "<p>Riders Republic combines five national park environments into one seamless open map. Its Mass Race mode deploys 64 simultaneous players racing the same downhill course in a single physics-tracked server, creating chaotic collisions and momentum drafting in real time.</p>" },
            { id: "efootball", title: "eFootball 2025", category: "sports", emoji: "🥅", excerpt: "Konami's free-to-play football sim rebuilt from the ground up on Unreal Engine.", meta: "Konami | 2024 | Sports Sim", description: "<p>eFootball 2025 positions itself as a pure football mechanics simulation, emphasising physical duel outcomes, body balance on the ball, and intelligent off-ball runs. Its Dream Team card-collecting mode competes directly with FIFA Ultimate Team while being free-to-play at its base tier.</p>" },

            // ===================== INDIE =====================
            { id: "stardew-valley", title: "Stardew Valley", category: "indie", emoji: "🌾", excerpt: "A solo-developed farming RPG that outsold most AAA games of its year.", meta: "ConcernedApe | 2016 | Farming RPG", description: "<p>Stardew Valley was built entirely by one developer over four years. Its multi-layered loop — farming, mining, fishing, relationship-building, and combat — is structured so that all activities feed into each other, creating genuine cross-system motivation. Version 1.6 and ongoing updates continue expanding the game eight years post-launch.</p>" },
            { id: "undertale", title: "Undertale", category: "indie", emoji: "💛", excerpt: "A subversive RPG that weaponises genre expectations against the player.", meta: "Toby Fox | 2015 | Indie RPG", description: "<p>Undertale's Genocide and Pacifist routes deliver fundamentally different games. The combat system allows every enemy to be befriended instead of killed, and bosses react to prior save file data — noticing if you've previously harmed characters. Its fourth-wall breaks recontextualise the entire RPG genre's relationship with player violence.</p>" },
            { id: "cuphead", title: "Cuphead", category: "indie", emoji: "☕", excerpt: "A 1930s-animation-styled boss-rush run-and-gun with extreme precision demands.", meta: "Studio MDHR | 2017 | Run-and-Gun", description: "<p>Cuphead hand-drew every frame of animation to replicate the rubber hose animation style of 1930s cartoons. Every boss fight is a multi-phase pattern study requiring memorisation of distinct projectile trajectories across 2-4 phases. Its DLC, The Delicious Last Course, is widely considered to surpass the base game's design quality.</p>" },
            { id: "hades2", title: "Hades II", category: "indie", emoji: "🌙", excerpt: "The early access sequel expanding the mythological roguelite with new protagonist Melinoë.", meta: "Supergiant Games | 2024 | Action Roguelite", description: "<p>Hades II introduces Melinoë, Zagreus's sister, with a witch-combat framework focused on hexes and incantation resources rather than Zagreus's dodge-centric style. Its new Olympus surface region adds a second game structure alongside the underworld — doubling the content scope of an already substantial sequel.</p>" },
            { id: "tunic", title: "Tunic", category: "indie", emoji: "📖", excerpt: "An isometric adventure game hiding its instruction manual as in-world collectable pages.", meta: "Andrew Shouldice | 2022 | Adventure", description: "<p>Tunic initially presents as a Zelda-like with no UI context. Hidden throughout the world are pages of an in-game instruction manual written in an indecipherable language. As players collect pages and decode the manual's script, mechanics that seemed like bugs reveal themselves as deeply intentional systems.</p>" },
            { id: "dave-diver", title: "Dave the Diver", category: "indie", emoji: "🤿", excerpt: "A hybrid diving exploration and sushi restaurant management game.", meta: "MINTROCKET | 2023 | Adventure / Management", description: "<p>Dave the Diver splits its day into two phases: ocean diving for ingredients through procedurally varying depths, and evening restaurant management serving sushi to demanding customers. Its tonal whiplash between relaxed diving and frantic service creates a uniquely satisfying double-loop progression.</p>" },
            { id: "loop-hero", title: "Loop Hero", category: "indie", emoji: "🔄", excerpt: "A deckbuilder roguelite where you place tiles to build the world your hero auto-battles through.", meta: "Four Quarters | 2021 | Deckbuilder Roguelite", description: "<p>Loop Hero removes direct combat control entirely — the hero fights automatically. Players instead place biome and enemy cards around the loop path, strategically creating threats that drop better loot. The meta-progression depends on recognising which tile synergies create manageable but rewarding risk loops.</p>" },
            { id: "neon-white", title: "Neon White", category: "indie", emoji: "🃏", excerpt: "A card-based speedrunning FPS where every action is a disposable weapon.", meta: "Angel Matrix | 2022 | Speed Action", description: "<p>Neon White gives each weapon type a soul card that serves as both the weapon and an alternative traversal ability on discard — a pistol becomes a double jump, a shotgun a ground slam. Levels are scored on time, driving players to discover increasingly creative card-discard routing solutions.</p>" },
            { id: "signalis", title: "SIGNALIS", category: "indie", emoji: "📡", excerpt: "A pixel-art survival horror CRPG inspired by Silent Hill and classic anime.", meta: "rose-engine | 2022 | Survival Horror", description: "<p>SIGNALIS presents its narrative through fragmented memories, unreliable documents, and environmental geometry, never explaining its science-fiction world directly. Its six-item inventory cap forces genuine resource triage, and its multiple endings depend on cumulative choice data tracked invisibly throughout.</p>" },
            { id: "spiritfarer", title: "Spiritfarer", category: "indie", emoji: "⛵", excerpt: "A cozy management game about death, grief, and saying goodbye.", meta: "Thunder Lotus Games | 2020 | Management", description: "<p>Spiritfarer casts the player as a ferryman guiding deceased spirits to the afterlife. Each spirit represents a relationship with a unique personality arc culminating in an emotionally processed farewell. Its self-described 'cozy management game about death' tone is simultaneously warm and profoundly sad.</p>" },
            { id: "inscryption", title: "Inscryption", category: "indie", emoji: "🃏", excerpt: "A deckbuilding horror game that subverts its own genre identity multiple times.", meta: "Daniel Mullins | 2021 | Deckbuilder / Meta-Horror", description: "<p>Inscryption begins as a Slay the Spire-inspired roguelite played against a sinister gamemaster and gradually reveals itself to be three entirely different games layered within a metafictional horror narrative. Its willingness to abandon its own gameplay system mid-story is one of the most audacious structural decisions in game design history.</p>" },
            { id: "disco-elysium-indie", title: "Return of the Obra Dinn", category: "indie", emoji: "🚢", excerpt: "A 1-bit mystery game where you reconstruct the deaths of 60 shipwrecked sailors.", meta: "Lucas Pope | 2018 | Mystery Puzzle", description: "<p>Obra Dinn gives players a magical pocket watch that replays the final moment of any dead person's life. Using forensic deduction across overlapping flashbacks, players identify 60 crew members' fates by cross-referencing journals, face recognition, and dialogue inference — with no direct confirmation until enough linked answers are submitted together.</p>" },
            { id: "placid-plastic", title: "Unpacking", category: "indie", emoji: "📦", excerpt: "A zen puzzle game telling a life story entirely through the objects a person owns.", meta: "Witch Beam | 2021 | Puzzle", description: "<p>Unpacking never shows or names its protagonist. Instead, players unpack moving boxes across eight apartments spanning decades of a life, reading biographical detail from what objects appear, which are left behind, and what new items join the collection. It is one of the purest examples of environmental storytelling ever built.</p>" }
        ];

        // Safe Initialization Check
        document.addEventListener("DOMContentLoaded", () => {
            const gridContainer = document.getElementById('encyclopedia-grid');
            const searchBar = document.getElementById('search-bar');
            const filterButtons = document.querySelectorAll('.filter-btn');
            const modal = document.getElementById('entry-modal');
            const closeModalBtn = document.getElementById('close-modal');
            const modalBody = document.getElementById('modal-body-content');

            let currentCategory = 'all';
            let searchQuery = '';

            function renderCards() {
                if (!gridContainer) return;
                gridContainer.innerHTML = '';

                const filteredData = encyclopediaData.filter(item => {
                    const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                    const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          item.excerpt.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                          item.description.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });

                if(filteredData.length === 0) {
                    gridContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); margin-top: 2rem;">No entries found fitting your criteria.</p>`;
                    return;
                }

                filteredData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('data-cat', item.category);
                    card.innerHTML = `
                        <div class="card-banner">${item.emoji}</div>
                        <div class="card-content">
                            <div class="card-category">${{games:'iconic game',rpg:'⚔️ RPG',action:'💥 Action',strategy:'🧠 Strategy',platformer:'🍄 Platformer',horror:'👁️ Horror',fighting:'🥊 Fighting',sports:'🏆 Sports',indie:'🌱 Indie',genres:'genre',mechanics:'mechanic',history:'history',hardware:'hardware'}[item.category] || item.category}</div>
                            <h2 class="card-title">${item.title}</h2>
                            <p class="card-excerpt">${item.excerpt}</p>
                            <div class="card-footer">Click to view database log →</div>
                        </div>
                    `;
                    card.addEventListener('click', () => openModal(item));
                    gridContainer.appendChild(card);
                });
            }

            function openModal(item) {
                if (!modalBody || !modal) return;
                modalBody.innerHTML = `
                    <div class="modal-header-tag">// Database Entry: ${item.category.toUpperCase()}</div>
                    <h1 class="modal-title">${item.emoji} ${item.title}</h1>
                    <div class="modal-meta">${item.meta}</div>
                    <div class="modal-description">${item.description}</div>
                `;
                modal.classList.add('active');
            }

            function closeModal() {
                if (modal) modal.classList.remove('active');
            }

            // Event Listeners setup
            if (searchBar) {
                searchBar.addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    renderCards();
                });
            }

            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    currentCategory = button.getAttribute('data-category');
                    renderCards();
                });
            });

            if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
            
            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) closeModal();
                });
            }

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });

            // Initial Draw
            renderCards();
        });

        


        
    </script>

    
</body>
